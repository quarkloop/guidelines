  #     minor-and-patch:
  #       update-types:
  #         - minor
  #         - patch
  #   labels:
  #     - dependencies

  # ─── GitHub Actions ───────────────────────────────────────────────────
  # Applies to: any repo with .github/workflows/*.yml
  #
